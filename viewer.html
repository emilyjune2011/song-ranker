<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Shared song ranking</title>
  <style>
    :root {
      --bg: #0a0a0d;
      --surface: #14141a;
      --border: #2a2a35;
      --text: #f4f4f7;
      --muted: #9a9ab0;
      --accent: #1ed760;
      --radius: 14px;
      font-family: "DM Sans", "Segoe UI", system-ui, sans-serif;
    }
    html[data-theme="light"] {
      --bg: #f6f6f9;
      --surface: #fff;
      --border: #e0e0ea;
      --text: #12121a;
      --muted: #5c5c70;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(30, 215, 96, 0.12), transparent 55%),
        radial-gradient(800px 400px at 90% 0%, rgba(99, 102, 241, 0.08), transparent 50%),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 1.5rem 1rem 2.5rem;
    }
    .hero {
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .hero h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .hero p {
      margin: 0;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem 1.15rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      background: rgba(30, 215, 96, 0.12);
      color: var(--accent);
      font-weight: 600;
      font-size: 0.72rem;
    }
    ol.list {
      margin: 0;
      padding-left: 1.15rem;
      font-size: 0.92rem;
    }
    ol.list li {
      margin-bottom: 0.45rem;
    }
    ol.list a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }
    ol.list a:hover {
      text-decoration: underline;
    }
    .sub {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 0.1rem;
    }
    .err {
      text-align: center;
      color: #e85d5d;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    .foot {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.76rem;
      color: var(--muted);
    }
    .foot a {
      color: var(--accent);
    }
    .hidden {
      display: none !important;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <h1 id="vh-title">Shared ranking</h1>
      <p id="vh-sub">Read-only list</p>
    </header>
    <div id="vh-card" class="card hidden">
      <div id="vh-meta" class="meta"></div>
      <ol id="vh-list" class="list"></ol>
    </div>
    <p id="vh-err" class="err hidden"></p>
    <p class="foot">Read-only share · created with Song ranker</p>
  </div>
  <script>
    (function () {
      function decodePayload(s) {
        if (!s) return null;
        try {
          s = s.replace(/-/g, "+").replace(/_/g, "/");
          while (s.length % 4) s += "=";
          var bin = atob(s);
          var bytes = new Uint8Array(bin.length);
          for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          var json = new TextDecoder().decode(bytes);
          return JSON.parse(json);
        } catch (e) {
          return null;
        }
      }

      function parseLocation() {
        var q = new URLSearchParams(window.location.search);
        var d = q.get("d");
        if (!d && window.location.hash) {
          var h = window.location.hash.replace(/^#/, "");
          if (h.indexOf("d=") === 0) d = h.slice(2);
        }
        return d ? decodeURIComponent(d) : null;
      }

      var data = null;
      var embedded = document.getElementById("sr-data");
      if (embedded) {
        try {
          data = JSON.parse(embedded.textContent);
        } catch (e) {}
      }
      if (!data) {
        var raw = parseLocation();
        data = raw ? decodePayload(raw) : null;
      }

      var errEl = document.getElementById("vh-err");
      var card = document.getElementById("vh-card");
      var titleEl = document.getElementById("vh-title");
      var subEl = document.getElementById("vh-sub");
      var metaEl = document.getElementById("vh-meta");
      var listEl = document.getElementById("vh-list");

      if (!data || data.v !== 1 || !Array.isArray(data.tracks)) {
        errEl.textContent =
          "No ranking data in this link. Open a link from Song ranker (Copy link), or use the downloaded HTML file.";
        errEl.classList.remove("hidden");
        subEl.textContent = "Nothing to show";
        return;
      }

      titleEl.textContent = data.title || "Shared ranking";
      var dt = data.createdAt ? new Date(data.createdAt) : null;
      subEl.textContent = dt ? "Shared · " + dt.toLocaleString() : "Shared list";

      metaEl.innerHTML = "";
      if (data.goal && data.goal !== "full") {
        var b = document.createElement("span");
        b.className = "badge";
        var g = String(data.goal);
        b.textContent = g.replace(/^top(\d+)$/i, "Top $1").replace(/^top/, "Top ");
        metaEl.appendChild(b);
      }
      var n = document.createElement("span");
      n.textContent = data.tracks.length + " tracks";
      metaEl.appendChild(n);

      listEl.innerHTML = "";
      data.tracks.forEach(function (row) {
        var li = document.createElement("li");
        var a = document.createElement("a");
        a.href = row.url || "#";
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = row.rank + ". " + row.name;
        li.appendChild(a);
        if (row.artists || row.album) {
          var sub = document.createElement("span");
          sub.className = "sub";
          sub.textContent = [row.artists, row.album].filter(Boolean).join(" · ");
          li.appendChild(sub);
        }
        listEl.appendChild(li);
      });

      card.classList.remove("hidden");
    })();
  </script>
</body>
</html>
